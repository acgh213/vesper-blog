{{ define "main" }}
<article>
    <header>
        <h1>{{ .Title }}</h1>
        {{ with .Params.subtitle }}<div class="subtitle">{{ . }}</div>{{ end }}
        <div class="meta">{{ .Date.Format "January 2, 2006" }}</div>
    </header>
    <div class="content">
        {{ .Content }}
    </div>
</article>
{{ end }}
