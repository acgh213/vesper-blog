<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Summary | plainify | truncate 160 }}{{ end }}">

{{/* Fonts */}}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">

{{/* RSS */}}
{{ range .AlternativeOutputFormats -}}
    {{ printf `<link rel=%q type=%q href=%q title=%q>` .Rel .MediaType.Type .Permalink $.Site.Title | safeHTML }}
{{ end -}}

{{/* Styles */}}
<style>
:root {
    --bg: #1a1a1f;
    --bg-card: #222228;
    --text: #e8e4df;
    --text-muted: #9a9590;
    --accent: #c4a882;
    --accent-hover: #d4b892;
    --border: #2a2a30;
    --font-serif: 'Instrument Serif', Georgia, serif;
    --font-sans: 'Inter', -apple-system, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
    font-size: 18px;
    scroll-behavior: smooth;
}

body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
}

.container {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 1.5rem;
}

/* Header */
header {
    padding: 3rem 0 2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 3rem;
}

header h1 {
    font-family: var(--font-serif);
    font-size: 1.8rem;
    font-weight: 400;
    letter-spacing: -0.02em;
}

header h1 a {
    color: var(--text);
    text-decoration: none;
}

header .subtitle {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-top: 0.3rem;
}

nav {
    margin-top: 1rem;
    display: flex;
    gap: 1.5rem;
}

nav a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.85rem;
    transition: color 0.2s;
}

nav a:hover {
    color: var(--accent);
}

/* Post list */
.post-list {
    list-style: none;
}

.post-list li {
    padding: 1.5rem 0;
    border-bottom: 1px solid var(--border);
}

.post-list li:last-child {
    border-bottom: none;
}

.post-list a {
    text-decoration: none;
}

.post-list .post-title {
    font-family: var(--font-serif);
    font-size: 1.3rem;
    color: var(--text);
    font-weight: 400;
    transition: color 0.2s;
}

.post-list a:hover .post-title {
    color: var(--accent);
}

.post-list .post-meta {
    color: var(--text-muted);
    font-size: 0.8rem;
    margin-top: 0.3rem;
}

.post-list .post-summary {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-top: 0.5rem;
    line-height: 1.6;
}

/* Single post */
article header {
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 2rem;
}

article header h1 {
    font-family: var(--font-serif);
    font-size: 2.2rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.3;
}

article header .meta {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-top: 0.8rem;
}

article header .subtitle {
    font-family: var(--font-serif);
    font-style: italic;
    color: var(--text-muted);
    font-size: 1.1rem;
    margin-top: 0.5rem;
}

article .content {
    font-size: 1rem;
    line-height: 1.8;
}

article .content p {
    margin-bottom: 1.3rem;
}

article .content h2 {
    font-family: var(--font-serif);
    font-size: 1.4rem;
    font-weight: 400;
    margin-top: 2.5rem;
    margin-bottom: 1rem;
    color: var(--text);
}

article .content h3 {
    font-size: 1rem;
    font-weight: 500;
    margin-top: 2rem;
    margin-bottom: 0.8rem;
}

article .content blockquote {
    border-left: 2px solid var(--accent);
    padding-left: 1.2rem;
    margin: 1.5rem 0;
    color: var(--text-muted);
    font-style: italic;
}

article .content a {
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 2px;
}

article .content a:hover {
    color: var(--accent-hover);
}

article .content em {
    font-family: var(--font-serif);
    font-style: italic;
}

article .content strong {
    font-weight: 500;
}

article .content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2rem 0;
}

article .content code {
    background: var(--bg-card);
    padding: 0.15em 0.4em;
    border-radius: 3px;
    font-size: 0.9em;
}

article .content pre {
    background: var(--bg-card);
    padding: 1.2rem;
    border-radius: 6px;
    overflow-x: auto;
    margin: 1.5rem 0;
}

article .content pre code {
    background: none;
    padding: 0;
}

/* Footer */
footer {
    padding: 3rem 0;
    border-top: 1px solid var(--border);
    margin-top: 3rem;
    color: var(--text-muted);
    font-size: 0.8rem;
    text-align: center;
}

/* About page */
.about-content {
    font-size: 1rem;
    line-height: 1.8;
}

/* Chapter navigation */
.chapter-nav {
    padding: 1rem 0;
    margin-bottom: 1rem;
}

.chapter-nav-bottom {
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
}

.chapter-nav-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.chapter-nav-left,
.chapter-nav-right {
    flex: 1;
}

.chapter-nav-right {
    text-align: right;
}

.chapter-nav-center {
    flex: 0 0 auto;
    padding: 0 1rem;
}

.chapter-nav a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.85rem;
    transition: color 0.2s;
}

.chapter-nav a:hover {
    color: var(--accent);
}

.chapter-position {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
}

.chapter-progress {
    margin-top: 0.8rem;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
}

.chapter-progress-bar {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
}

.chapter-number {
    font-size: 0.8rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
}

.chapter-index-link {
    text-align: center;
    padding: 2rem 0;
    font-size: 0.85rem;
}

.chapter-index-link a {
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.2s;
}

.chapter-index-link a:hover {
    color: var(--accent);
}

/* Season landing page */
.season-header {
    padding-bottom: 2rem;
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--border);
}

.season-header h1 {
    font-family: var(--font-serif);
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: -0.02em;
}

.season-intro {
    margin-top: 1rem;
    color: var(--text-muted);
    font-size: 0.95rem;
    line-height: 1.7;
}

.season-toc {
    list-style: none;
    counter-reset: none;
}

.season-toc li {
    border-bottom: 1px solid var(--border);
}

.season-toc li:last-child {
    border-bottom: none;
}

.season-toc a {
    display: block;
    padding: 1.2rem 0;
    text-decoration: none;
    transition: color 0.2s;
}

.season-toc a:hover .toc-title {
    color: var(--accent);
}

.toc-number {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    margin-right: 1rem;
    letter-spacing: 0.05em;
}

.toc-title {
    font-family: var(--font-serif);
    font-size: 1.2rem;
    color: var(--text);
    display: block;
    transition: color 0.2s;
}

.toc-subtitle {
    display: block;
    font-size: 0.85rem;
    color: var(--text-muted);
    font-style: italic;
    margin-top: 0.3rem;
    padding-left: 2.2rem;
}

/* Responsive */
@media (max-width: 600px) {
    html { font-size: 16px; }
    article header h1 { font-size: 1.8rem; }
    .container { padding: 0 1rem; }
    .toc-subtitle { padding-left: 0; }
    .chapter-nav-prev,
    .chapter-nav-next { font-size: 0.75rem; }
}
</style>
