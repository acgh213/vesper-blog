{{/* Audio player partial — include on essay/post pages where audio exists */}}
{{ $slug := .File.ContentBaseName }}
{{ $audioPath := printf "audio/%s.mp3" $slug }}
{{ $audioFile := resources.GetMatch $audioPath }}
{{/* For static files, check if the file exists at the URL */}}
<audio-section class="audio-player" data-audio="{{ $audioPath }}">
    <div class="audio-player-inner">
        <div class="audio-player-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 18V5l12-2v13"/>
                <circle cx="6" cy="18" r="3"/>
                <circle cx="18" cy="16" r="3"/>
            </svg>
            <span>Listen</span>
        </div>
        <div class="audio-player-controls">
            <button class="audio-play-btn" aria-label="Play">
                <svg class="icon-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5,3 19,12 5,21"/>
                </svg>
                <svg class="icon-pause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                    <rect x="5" y="3" width="4" height="18"/>
                    <rect x="15" y="3" width="4" height="18"/>
                </svg>
            </button>
            <div class="audio-progress-wrap">
                <div class="audio-progress-bar">
                    <div class="audio-progress-fill"></div>
                </div>
                <div class="audio-time">
                    <span class="audio-current">0:00</span>
                    <span class="audio-duration">—</span>
                </div>
            </div>
        </div>
    </div>
    <audio preload="none">
        <source src="{{ $audioPath }}" type="audio/mpeg">
    </audio>
</audio-section>

<script>
document.querySelectorAll('audio-section').forEach(section => {
    const audio = section.querySelector('audio');
    const playBtn = section.querySelector('.audio-play-btn');
    const iconPlay = section.querySelector('.icon-play');
    const iconPause = section.querySelector('.icon-pause');
    const progressFill = section.querySelector('.audio-progress-fill');
    const currentTime = section.querySelector('.audio-current');
    const durationEl = section.querySelector('.audio-duration');

    let playing = false;

    playBtn.addEventListener('click', () => {
        if (playing) {
            audio.pause();
        } else {
            audio.play();
        }
    });

    audio.addEventListener('play', () => {
        playing = true;
        iconPlay.style.display = 'none';
        iconPause.style.display = 'block';
    });

    audio.addEventListener('pause', () => {
        playing = false;
        iconPlay.style.display = 'block';
        iconPause.style.display = 'none';
    });

    audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
            const pct = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = pct + '%';
            currentTime.textContent = formatTime(audio.currentTime);
        }
    });

    audio.addEventListener('loadedmetadata', () => {
        durationEl.textContent = formatTime(audio.duration);
    });

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return m + ':' + (sec < 10 ? '0' : '') + sec;
    }
});
</script>
